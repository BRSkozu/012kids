name: Daily Article Generation & Validation

on:
  schedule:
    # 毎日日本時間午前6時（UTC 21:00前日）に実行
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: '生成する記事数（デフォルト10件）'
        required: false
        default: '10'
      skip_deploy:
        description: 'デプロイをスキップする'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'daily-articles'
  cancel-in-progress: false

jobs:
  generate-validate-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Run unit tests before any generation/deploy
      - name: Run tests
        run: npm test

      # Step 1: Generate new articles
      - name: Generate new articles
        run: node scripts/daily-article-generator.mjs --count ${{ github.event.inputs.count || '10' }}

      # Step 2: Rebuild index & assets
      - name: Regenerate article index and assets
        run: |
          node scripts/generate-articles.mjs
          node scripts/generate-sitemap-rss.mjs 2>/dev/null || true
          node scripts/generate-llms-txt.mjs 2>/dev/null || true

      # Step 3: Validate all articles
      - name: Validate articles
        run: node scripts/validate-articles.mjs --strict

      # Step 4: Check internal links
      - name: Check internal links
        run: node scripts/check-links.mjs --skip-external --strict

      # Step 5: Count and commit
      - name: Count new articles
        id: count
        run: |
          # Count both newly created (untracked) and modified mdx files.
          # `git diff --diff-filter=A` does NOT see untracked files, so we
          # use `git status --porcelain` to detect newly created mdx.
          NEW_COUNT=$(git status --porcelain content/articles/ | awk '/^\?\?/ && /\.mdx$/' | wc -l)
          MODIFIED_COUNT=$(git diff --name-only -- content/articles/ | grep '\.mdx$' | wc -l)
          echo "new_articles=$NEW_COUNT" >> $GITHUB_OUTPUT
          echo "modified_articles=$MODIFIED_COUNT" >> $GITHUB_OUTPUT
          TOTAL=$(find content/articles -name '*.mdx' | wc -l)
          echo "total_articles=$TOTAL" >> $GITHUB_OUTPUT
          # has_changes: include untracked files so feed/sitemap-only diffs
          # are not the only signal.
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
          echo "📊 New: $NEW_COUNT, Modified: $MODIFIED_COUNT, Total: $TOTAL"

      - name: Warn if no new articles
        if: steps.count.outputs.new_articles == '0'
        run: |
          echo "⚠️  新規記事が0件です。topic-db のプール枯渇か生成エラーの可能性があります。"
          echo "::warning::Daily generator produced 0 new articles. Check topic pool."

      - name: Commit and push
        if: steps.count.outputs.has_changes == 'true'
        run: |
          git config user.name "012kids-bot"
          git config user.email "bot@012.kids"
          git add content/articles/ src/data/articles.ts public/ scripts/topic-db.json
          git commit -m "feat: 自動生成 ${{ steps.count.outputs.new_articles }}件の新規記事を追加（合計${{ steps.count.outputs.total_articles }}件）

          Generated by daily-article-generator.mjs via GitHub Actions
          Validation: passed (0 errors)"
          git push

      # Step 6: Build & Deploy
      - name: Build site
        if: steps.count.outputs.has_changes == 'true' && github.event.inputs.skip_deploy != 'true'
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_BASE_PATH: /012kids
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}

      - name: Upload Pages artifact
        if: steps.count.outputs.has_changes == 'true' && github.event.inputs.skip_deploy != 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        if: steps.count.outputs.has_changes == 'true' && github.event.inputs.skip_deploy != 'true'
        uses: actions/deploy-pages@v5

      # Summary
      - name: Summary
        if: always()
        run: |
          echo "## 📝 Daily Article Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **New articles**: ${{ steps.count.outputs.new_articles }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Modified articles**: ${{ steps.count.outputs.modified_articles }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total articles**: ${{ steps.count.outputs.total_articles }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changes committed**: ${{ steps.count.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
