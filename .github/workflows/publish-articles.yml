name: Weekly Link & Quality Check

on:
  schedule:
    # 毎週月曜 日本時間午前3時（UTC 日曜 18:00）
    - cron: '0 18 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate articles (logic check)
        run: node scripts/validate-articles.mjs

      - name: Check links (internal + external)
        run: node scripts/check-links.mjs --concurrency 5

      - name: Summary
        if: always()
        run: |
          TOTAL=$(find content/articles -name '*.mdx' | wc -l)
          echo "## 🔗 Weekly Quality Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Total articles**: $TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See job logs for validation details and link check results." >> $GITHUB_STEP_SUMMARY
