name: Daily Access Report

on:
  schedule:
    # 毎日日本時間午前9時（UTC 00:00）に実行
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  send-access-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install @google-analytics/data

      - name: Generate access report
        id: report
        env:
          GA_SERVICE_ACCOUNT_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
        run: |
          node scripts/generate-access-report.mjs > report.html
          echo "date=$(TZ=Asia/Tokyo date '+%Y年%m月%d日')" >> $GITHUB_OUTPUT

      - name: Send email report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "012.kids アクセスレポート (${{ steps.report.outputs.date }})"
          to: ryukozu@gmail.com
          from: "012.kids レポート <${{ secrets.SMTP_USERNAME }}>"
          html_body: file://report.html
          content_type: text/html

      - name: Summary
        if: always()
        run: |
          echo "## 📊 Daily Access Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: ${{ steps.report.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Email sent to**: ryukozu@gmail.com" >> $GITHUB_STEP_SUMMARY
